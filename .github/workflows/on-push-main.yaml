---
name: main branch
"on":
  push:
    branches:
      - main

jobs:
  test-actions:
    permissions:
      checks: write
      contents: read
    with:
      github-token: ${{ github.token }}
    uses: ./.github/workflows/run-test-actions.yaml

  test-go:
    permissions:
      contents: read
    uses: ./.github/workflows/run-test-go.yaml
